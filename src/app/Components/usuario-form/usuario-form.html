<div class="desk-environment">
  <div class="pokedex-case">
    
    <div class="pokedex-top-hardware">
      <div class="camera-lens">
        <div class="lens-reflection"></div>
      </div>
      <div class="status-lights">
        <div class="light light-red"></div>
        <div class="light light-yellow"></div>
        <div class="light light-green"></div>
      </div>
    </div>

    <div class="pokedex-screen">
      <div class="screen-header">
        <h1 class="poke-title">¡NUEVO ENTRENADOR!</h1>
        <p class="poke-subtitle">Completa tu perfil de entrenador</p>
      </div>

      <form [formGroup]="formulario" (submit)="enviarDatos()" class="poke-form">
        <mat-form-field appearance="outline" class="poke-field">
          <mat-label>Nombre</mat-label>
          <input matInput type="text" formControlName="nombre" />
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <div class="poke-row">
          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Apellido Paterno</mat-label>
            <input matInput type="text" formControlName="apellidoPaterno" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Apellido Materno</mat-label>
            <input matInput type="text" formControlName="apellidoMaterno" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="poke-field">
          <mat-label>Fecha de Nacimiento</mat-label>
          <input matInput type="date" formControlName="fechaNacimiento" />
          <mat-icon matSuffix>calendar_month</mat-icon>
        </mat-form-field>

        <div class="poke-row">
          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Nombre de usuario</mat-label>
            <input matInput type="text" formControlName="userName" />
            <mat-icon matSuffix>account_circle</mat-icon>
          </mat-form-field>
          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="correo" />
            <mat-icon matSuffix>email</mat-icon>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="poke-field">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          <mat-icon matSuffix (click)="hidePassword = !hidePassword" style="cursor: pointer;">
            {{ hidePassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </mat-form-field>

        <div class="form-footer-grid">
          <div class="poke-radio-group">
            <label class="poke-radio-label">Sexo</label>
            <mat-radio-group formControlName="sexo" class="poke-radio-options">
              <mat-radio-button value="M">Masculino</mat-radio-button>
              <mat-radio-button value="F">Femenino</mat-radio-button>
            </mat-radio-group>
          </div>
        </div>

        <button type="submit" style="display: none;" #submitBtn></button>
      </form>
    </div>

    <div class="pokedex-bottom-hardware">
      <a class="physical-btn btn-black" (click)="regresar()">
        <mat-icon>keyboard_return</mat-icon> REGRESAR
      </a>
      
      <div class="speaker-grill">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>

      <button class="physical-btn btn-blue" (click)="submitBtn.click()">
        CREAR CUENTA <mat-icon>double_arrow</mat-icon>
      </button>
    </div>

  </div>
</div>
