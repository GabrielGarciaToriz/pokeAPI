<div class="titulo">
    <h1 class="ps-3">PokeApi <img
            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt=""> </h1>

</div>
<div class=" bg-transparent p-5">

    <div>
        <input [(ngModel)]="searchTerm" type="text" class="form-control mb-4 p-4 busquedaPokemon" placeholder="Buscar Pokemon por nombre ..." (input)="filtrar()">
    </div>



    <div class="row row-cols-1 row-cols-md-4 g-2 bg-transparent">
        
    @for (pokemon of pokemonsFiltrados; track pokemon.name) {
    
  

        <div class="card g-4 border border-0 row bg.danger">

            <div class="card border border-0 ">
                <div class="card-body border border-0 rounded-4 col zoom front">


                    <div class="rounded-circle divImagenPokemon text-white" >
                    <!-- <p>{{pokemon.url}}</p> -->

                    <img [src]="pokemon.image" alt="" class="imgPokemon">
  
                </div>
                    <p class="text-center fw-bold">No. {{pokemon.idPokemon}}</p>


                    <div class="rounded-pill nombrePokemon">
                        <p>{{pokemon.name.toUpperCase() }}</p>

                    </div>

                </div>
                
            </div>

        
        </div>
    }


   </div>


  <div class="mt-5 justify-content-center d-flex">
  <button (click)="PaginaAnterior()" class="btn btnPaginacion m-4">Anterior</button>
  <button (click)="PaginaSiguiente()" class="btn btnPaginacion m-4">Siguiente</button>
</div>




</div>

<footer class="bg-dark text-center text-white p-3">
    <p>&copy;PokeApi</p>


</footer>
