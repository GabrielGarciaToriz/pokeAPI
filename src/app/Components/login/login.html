<div class="poke-wrapper">

  <!-- Header -->
  <mat-toolbar class="poke-toolbar">
    <span class="poke-logo">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Pikachu" class="poke-icon" />
      PokeApi
    </span>
  </mat-toolbar>

  <!-- Card central -->
  <div class="poke-center">
    <mat-card class="poke-card">

      <!-- Pokeball decorativa -->
      <div class="pokeball-deco">
        <div class="pokeball-top"></div>
        <div class="pokeball-band">
          <div class="pokeball-button"></div>
        </div>
        <div class="pokeball-bottom"></div>
      </div>

      <mat-card-header class="poke-card-header">
        <mat-card-title class="poke-title">Inicio de Sesión</mat-card-title>
        <mat-card-subtitle class="poke-subtitle">Accede a tu Pokédex</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="formulario" (submit)="enviarDatos()" class="poke-form">

          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Correo</mat-label>
            <input matInput type="email" formControlName="correo" placeholder="entrenador@pokemon.com" />
            <mat-icon matSuffix>catching_pokemon</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="poke-field">
            <mat-label>Contraseña</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
            <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          @if (errorMessage) {
            <mat-error class="poke-error">
              <mat-icon>error_outline</mat-icon>
              {{ errorMessage }}
            </mat-error>
          }

          <button mat-raised-button class="poke-btn-submit" type="submit">
            <mat-icon>login</mat-icon>
            ¡Acceder!
          </button>

        </form>
      </mat-card-content>

      <mat-card-actions class="poke-actions">
        <a mat-button class="poke-link" [routerLink]="['/forgot-password']">
          ¿Olvidaste tu contraseña?
        </a>
        <mat-divider></mat-divider>
        <p class="poke-register">
          ¿No tienes cuenta?
          <a mat-button class="poke-link-accent" [routerLink]="['/formulario']">¡Regístrate!</a>
        </p>
      </mat-card-actions>

    </mat-card>
  </div>

</div>
