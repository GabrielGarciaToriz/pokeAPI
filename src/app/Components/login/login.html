<div class="titulo">
    <h1>
      PokeApi
      <img
        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
        alt="Pikachu"
      />
    </h1>
  </div>
<div class="container mt-5 justify-content-center rounded-4 align-items-center d-flex w-25">
  <form [formGroup]="formulario" (submit)="enviarDatos()">
    <div class="card card-body loginBackgroundBody align-items-center rounded-4 w-80">
      <div class="tituloLogin">
        <h4>Inicio de sesión</h4>
      </div>

      <div class="fondoPokeball d-flex justify-content-center">
        <div class="pokeball"></div>
      </div>

      <div class="mb-3 align-items-center text-white">
        <label for="form-label">Correo:</label>
        <input type="email" class="form-control text-center" formControlName="correo" />
      </div>

      <div class="mb-3 align-items-center text-white">
        <label for="form-label">Contraseña:</label>
        <input type="password" class="form-control text-center" formControlName="password" />

        <div class="mb-3">
          @if (errorMessage) {
            <p class="text-warning">{{ errorMessage }}</p>
          }
        </div>
      </div>

      <div class="mb-3">
        <button type="submit" class="btn btnEnviar">Acceder</button>
      </div>

      <div>
        <p><span>¿No tiene una cuenta? </span> <a [routerLink]="['/formulario']">¡Cree una!</a></p>
      </div>
    </div>
  </form>
</div>
